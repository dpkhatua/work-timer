<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ledger — Work Timer</title>
<style>
  @font-face {
    font-family: 'DigitFace';
    src: local('Courier New');
  }

  :root{
    --ink: #eae6dc;
    --ink-dim: #9a9488;
    --paper: #14130f;
    --paper-raised: #1c1a15;
    --line: #322f27;
    --brass: #c7a252;
    --brass-dim: #7a6634;
    --red: #b5533c;
    --green: #6f8f5a;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  body{
    background: var(--paper);
    background-image:
      radial-gradient(circle at 20% 10%, rgba(199,162,82,0.05), transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(199,162,82,0.04), transparent 40%);
    color: var(--ink);
    font-family: 'Courier New', Courier, monospace;
    min-height: 100vh;
    display:flex;
    justify-content:center;
    padding: 28px 16px 60px;
    -webkit-font-smoothing: antialiased;
  }

  .sheet{
    width:100%;
    max-width: 560px;
  }

  header{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    border-bottom: 1px solid var(--line);
    padding-bottom: 14px;
    margin-bottom: 22px;
  }

  header .mark{
    font-size: 13px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--brass);
  }
  header .date{
    font-size: 11px;
    color: var(--ink-dim);
    letter-spacing: 0.05em;
  }

  /* Mode toggle */
  .modes{
    display:flex;
    gap: 0;
    margin-bottom: 22px;
    border: 1px solid var(--line);
  }
  .modes button{
    flex:1;
    background: transparent;
    border:none;
    color: var(--ink-dim);
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 11px 0;
    cursor:pointer;
    transition: background .15s, color .15s;
  }
  .modes button + button{ border-left: 1px solid var(--line); }
  .modes button.active{
    background: var(--brass);
    color: #14130f;
    font-weight: bold;
  }

  /* Timer display */
  .display-wrap{
    background: var(--paper-raised);
    border: 1px solid var(--line);
    padding: 40px 20px 32px;
    text-align:center;
    margin-bottom: 18px;
    position: relative;
  }
  .display-wrap::before{
    content: attr(data-status);
    position:absolute;
    top: 12px; left: 14px;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--ink-dim);
    text-transform: uppercase;
  }

  .digits{
    font-size: 58px;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
    line-height:1;
    color: var(--ink);
  }
  .digits.running{ color: var(--brass); }
  .digits.overdue{ color: var(--red); }

  .countdown-set{
    display:flex;
    justify-content:center;
    gap: 10px;
    margin-top: 18px;
  }
  .countdown-set input{
    width: 64px;
    background: var(--paper);
    border: 1px solid var(--line);
    color: var(--ink);
    font-family: inherit;
    font-size: 16px;
    text-align:center;
    padding: 8px 4px;
  }
  .countdown-set input:focus{ outline: 1px solid var(--brass); }
  .countdown-set label{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap: 4px;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--ink-dim);
    text-transform: uppercase;
  }

  .controls{
    display:flex;
    gap: 10px;
    margin-bottom: 30px;
  }
  .controls button{
    flex:1;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 14px 0;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--ink);
    cursor:pointer;
    transition: border-color .15s, color .15s;
  }
  .controls button:hover{ border-color: var(--brass); color: var(--brass); }
  .controls button.primary{
    background: var(--brass);
    border-color: var(--brass);
    color: #14130f;
    font-weight:bold;
  }
  .controls button.primary:hover{ color:#14130f; }
  .controls button.stop{ border-color: var(--red); color: var(--red); }
  .controls button:disabled{ opacity: 0.35; cursor:not-allowed; }

  /* Log entry field, appears when stopping with time > 0 */
  .log-entry{
    display:none;
    background: var(--paper-raised);
    border: 1px solid var(--brass-dim);
    padding: 16px;
    margin-bottom: 22px;
  }
  .log-entry.show{ display:block; }
  .log-entry .label{
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--brass);
    margin-bottom: 8px;
  }
  .log-entry input[type=text]{
    width:100%;
    background: var(--paper);
    border: 1px solid var(--line);
    color: var(--ink);
    font-family: inherit;
    font-size: 14px;
    padding: 10px;
    margin-bottom: 10px;
  }
  .log-entry input[type=text]:focus{ outline:1px solid var(--brass); }
  .log-entry .row{ display:flex; gap:10px; }
  .log-entry .row button{
    flex:1;
    font-family:inherit;
    font-size: 11px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    padding: 10px 0;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--ink);
    cursor:pointer;
  }
  .log-entry .row button.save{
    background: var(--green);
    border-color: var(--green);
    color: #0f130e;
    font-weight:bold;
  }

  /* Ledger / log list */
  .stats-box{
    display:flex;
    flex-wrap: wrap;
    border: 1px solid var(--line);
    margin-bottom: 22px;
  }
  .stat{
    flex: 1 1 25%;
    min-width: 90px;
    text-align:center;
    padding: 14px 6px;
    border-bottom: 1px solid var(--line);
  }
  .stat:nth-last-child(-n+2){ border-bottom: none; }
  .stat + .stat{ border-left: 1px solid var(--line); }
  .stat-label{
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-bottom: 6px;
  }
  .stat-val{
    font-size: 17px;
    color: var(--brass);
    font-variant-numeric: tabular-nums;
  }

  .manual-add-btn{
    display:block;
    width:100%;
    background: transparent;
    border: 1px dashed var(--line);
    color: var(--ink-dim);
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 12px 0;
    margin-bottom: 14px;
    cursor:pointer;
    transition: border-color .15s, color .15s;
  }
  .manual-add-btn:hover{ border-color: var(--brass); color: var(--brass); }

  .manual-grid{
    display:flex;
    gap: 10px;
    margin-bottom: 10px;
  }
  .manual-grid label{
    flex:1;
    display:flex;
    flex-direction:column;
    gap: 5px;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }
  .manual-grid input{
    background: var(--paper);
    border: 1px solid var(--line);
    color: var(--ink);
    font-family: inherit;
    font-size: 14px;
    padding: 9px 6px;
  }
  .manual-grid input:focus{ outline: 1px solid var(--brass); }

  .day-browse{
    border: 1px solid var(--line);
    padding: 16px 16px 6px;
    margin-bottom: 22px;
    touch-action: pan-y;
    user-select: none;
  }
  .day-browse-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom: 6px;
  }
  .day-arrow{
    background: transparent;
    border: 1px solid var(--line);
    color: var(--ink-dim);
    font-family: inherit;
    font-size: 18px;
    width: 34px;
    height: 34px;
    line-height: 1;
    cursor: pointer;
    flex-shrink: 0;
  }
  .day-arrow:hover{ border-color: var(--brass); color: var(--brass); }
  .day-arrow:disabled{ opacity: 0.3; cursor: default; }
  .day-browse-date{
    font-size: 13px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink);
    text-align: center;
    flex: 1;
  }
  .day-browse-total{
    text-align:center;
    font-size: 24px;
    color: var(--brass);
    font-variant-numeric: tabular-nums;
    margin-bottom: 10px;
  }
  .day-browse-hint{
    text-align:center;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--line);
    padding: 8px 0 4px;
  }

  .ledger-head{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    border-bottom: 1px solid var(--line);
    padding-bottom: 8px;
    margin-bottom: 12px;
  }
  .ledger-head h2{
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-dim);
    font-weight:normal;
  }
  .ledger-head .total{
    font-size: 12px;
    color: var(--brass);
  }

  .entry{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding: 12px 2px;
    border-bottom: 1px dashed var(--line);
    gap: 10px;
  }
  .entry .left{ min-width:0; }
  .entry .task{
    font-size: 14px;
    color: var(--ink);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .entry .meta{
    font-size: 10px;
    color: var(--ink-dim);
    margin-top: 3px;
    letter-spacing: 0.05em;
  }
  .entry .dur{
    font-size: 15px;
    color: var(--brass);
    font-variant-numeric: tabular-nums;
    white-space:nowrap;
  }
  .entry .del{
    background:none;
    border:none;
    color: var(--ink-dim);
    font-size: 16px;
    cursor:pointer;
    padding: 0 0 0 6px;
    line-height:1;
  }
  .entry .del:hover{ color: var(--red); }

  .empty{
    color: var(--ink-dim);
    font-size: 12px;
    text-align:center;
    padding: 30px 0;
    letter-spacing: 0.05em;
  }

  .io-row{
    display:flex;
    gap: 10px;
    margin-top: 20px;
  }
  .io-row button{
    flex:1;
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 11px 0;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--ink-dim);
    cursor:pointer;
    transition: border-color .15s, color .15s;
  }
  .io-row button:hover{ border-color: var(--brass); color: var(--brass); }

  footer{
    margin-top: 22px;
    text-align:center;
    font-size: 10px;
    color: var(--line);
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>
<div class="sheet">

  <header>
    <div class="mark">Ledger</div>
    <div class="date" id="today"></div>
  </header>

  <div class="modes">
    <button id="modeStopwatch" class="active">Stopwatch</button>
    <button id="modeCountdown">Countdown</button>
  </div>

  <div class="display-wrap" id="displayWrap" data-status="Ready">
    <div class="digits" id="digits">00:00:00</div>
    <div class="countdown-set" id="countdownSet" style="display:none;">
      <label>Hrs <input type="number" id="setH" min="0" max="23" value="0"></label>
      <label>Min <input type="number" id="setM" min="0" max="59" value="25"></label>
      <label>Sec <input type="number" id="setS" min="0" max="59" value="0"></label>
    </div>
  </div>

  <div class="controls">
    <button id="startBtn" class="primary">Start</button>
    <button id="pauseBtn" disabled>Pause</button>
    <button id="stopBtn" class="stop" disabled>Stop &amp; Log</button>
  </div>

  <div class="log-entry" id="logEntry">
    <div class="label">What did you work on?</div>
    <input type="text" id="taskInput" placeholder="e.g. Drafted client proposal" maxlength="120">
    <div class="row">
      <button id="discardBtn">Discard</button>
      <button id="saveBtn" class="save">Save entry</button>
    </div>
  </div>

  <div class="stats-box" id="statsBox">
    <div class="stat">
      <div class="stat-label">This week</div>
      <div class="stat-val" id="statWeekTotal">0h 00m</div>
    </div>
    <div class="stat">
      <div class="stat-label">Daily avg (7d)</div>
      <div class="stat-val" id="statDailyAvg">0h 00m</div>
    </div>
    <div class="stat">
      <div class="stat-label">Active days</div>
      <div class="stat-val" id="statActiveDays">0 / 7</div>
    </div>
  </div>

  <div class="ledger-head">
    <h2>Today's Log</h2>
    <div class="total" id="dayTotal">0h 00m</div>
  </div>

  <button id="addManualBtn" class="manual-add-btn">+ Add a past entry</button>

  <div class="log-entry" id="manualEntry">
    <div class="label">Add entry manually</div>
    <input type="text" id="manualTask" placeholder="What did you work on?" maxlength="120">
    <div class="manual-grid">
      <label>Date<input type="date" id="manualDate"></label>
      <label>Time<input type="time" id="manualTime"></label>
    </div>
    <div class="manual-grid">
      <label>Hours<input type="number" id="manualH" min="0" max="23" value="0"></label>
      <label>Minutes<input type="number" id="manualM" min="0" max="59" value="30"></label>
    </div>
    <div class="row">
      <button id="manualCancelBtn">Cancel</button>
      <button id="manualSaveBtn" class="save">Add entry</button>
    </div>
  </div>

  <div id="logList"></div>

  <div class="day-browse" id="dayBrowse">
    <div class="day-browse-head">
      <button id="dayPrev" class="day-arrow">‹</button>
      <div class="day-browse-date" id="dayBrowseDate">Yesterday</div>
      <button id="dayNext" class="day-arrow">›</button>
    </div>
    <div class="day-browse-total" id="dayBrowseTotal">0h 00m</div>
    <div id="dayBrowseList"></div>
    <div class="day-browse-hint">swipe or tap arrows to change day</div>
  </div>

  <div class="io-row">
    <button id="exportBtn">Export log (.json)</button>
    <button id="importBtn">Import log (.json)</button>
    <input type="file" id="importFile" accept="application/json" style="display:none;">
  </div>

  <footer>ENTRIES SYNC PRIVATELY TO YOUR CLAUDE ACCOUNT — USE EXPORT TO BACK UP OR MOVE THEM</footer>
</div>

<script>
(function(){
  const digits = document.getElementById('digits');
  const displayWrap = document.getElementById('displayWrap');
  const startBtn = document.getElementById('startBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const stopBtn = document.getElementById('stopBtn');
  const modeStopwatch = document.getElementById('modeStopwatch');
  const modeCountdown = document.getElementById('modeCountdown');
  const countdownSet = document.getElementById('countdownSet');
  const setH = document.getElementById('setH');
  const setM = document.getElementById('setM');
  const setS = document.getElementById('setS');
  const logEntry = document.getElementById('logEntry');
  const taskInput = document.getElementById('taskInput');
  const saveBtn = document.getElementById('saveBtn');
  const discardBtn = document.getElementById('discardBtn');
  const logList = document.getElementById('logList');
  const dayTotal = document.getElementById('dayTotal');
  const todayEl = document.getElementById('today');

  let mode = 'stopwatch'; // or 'countdown'
  let running = false;
  let startTimestamp = 0;
  let elapsedBeforePause = 0; // ms, for stopwatch
  let countdownTotalMs = 0;
  let interval = null;
  let pendingSeconds = 0; // seconds to log when stopped
  let entries = [];

  const pad = n => String(n).padStart(2,'0');

  function fmt(ms){
    let totalSec = Math.max(0, Math.round(ms/1000));
    const h = Math.floor(totalSec/3600);
    const m = Math.floor((totalSec%3600)/60);
    const s = totalSec%60;
    return `${pad(h)}:${pad(m)}:${pad(s)}`;
  }

  function fmtHuman(sec){
    const h = Math.floor(sec/3600);
    const m = Math.floor((sec%3600)/60);
    if(h>0) return `${h}h ${pad(m)}m`;
    return `${m}m ${pad(sec%60)}s`;
  }

  todayEl.textContent = new Date().toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'});

  function setMode(m){
    if(running) return; // don't allow switching mid-run
    mode = m;
    modeStopwatch.classList.toggle('active', m==='stopwatch');
    modeCountdown.classList.toggle('active', m==='countdown');
    countdownSet.style.display = m==='countdown' ? 'flex' : 'none';
    resetDisplay();
  }
  modeStopwatch.addEventListener('click', ()=>setMode('stopwatch'));
  modeCountdown.addEventListener('click', ()=>setMode('countdown'));

  function resetDisplay(){
    if(mode==='stopwatch'){
      digits.textContent = '00:00:00';
    } else {
      const total = (parseInt(setH.value)||0)*3600 + (parseInt(setM.value)||0)*60 + (parseInt(setS.value)||0);
      digits.textContent = fmt(total*1000);
    }
    digits.classList.remove('running','overdue');
    displayWrap.dataset.status = 'Ready';
  }
  [setH,setM,setS].forEach(el=>el.addEventListener('input', resetDisplay));

  function tick(){
    const now = Date.now();
    if(mode==='stopwatch'){
      const elapsed = elapsedBeforePause + (now - startTimestamp);
      digits.textContent = fmt(elapsed);
    } else {
      const elapsed = elapsedBeforePause + (now - startTimestamp);
      const remaining = countdownTotalMs - elapsed;
      if(remaining <= 0){
        digits.textContent = '00:00:00';
        digits.classList.add('overdue');
        digits.classList.remove('running');
        displayWrap.dataset.status = 'Time\'s up';
        clearInterval(interval);
        running = false;
        pendingSeconds = Math.round(countdownTotalMs/1000);
        startBtn.disabled = true;
        pauseBtn.disabled = true;
        stopBtn.disabled = false;
        stopBtn.textContent = 'Log this session';
        // gentle alert
        try{ navigator.vibrate && navigator.vibrate([200,100,200]); }catch(e){}
      } else {
        digits.textContent = fmt(remaining);
      }
    }
  }

  startBtn.addEventListener('click', ()=>{
    if(mode==='countdown' && elapsedBeforePause===0){
      const total = (parseInt(setH.value)||0)*3600 + (parseInt(setM.value)||0)*60 + (parseInt(setS.value)||0);
      if(total<=0){ alert('Set a countdown time first.'); return; }
      countdownTotalMs = total*1000;
    }
    running = true;
    startTimestamp = Date.now();
    interval = setInterval(tick, 1000);
    tick();
    digits.classList.add('running');
    digits.classList.remove('overdue');
    displayWrap.dataset.status = 'Running';
    startBtn.disabled = true;
    pauseBtn.disabled = false;
    stopBtn.disabled = false;
    modeStopwatch.disabled = true;
    modeCountdown.disabled = true;
    setH.disabled = setM.disabled = setS.disabled = true;
    saveSession();
  });

  pauseBtn.addEventListener('click', ()=>{
    running = false;
    clearInterval(interval);
    elapsedBeforePause += Date.now() - startTimestamp;
    digits.classList.remove('running');
    displayWrap.dataset.status = 'Paused';
    startBtn.disabled = false;
    startBtn.textContent = 'Resume';
    pauseBtn.disabled = true;
    saveSession();
  });

  stopBtn.addEventListener('click', ()=>{
    clearInterval(interval);
    let elapsedMs;
    if(mode==='stopwatch'){
      elapsedMs = elapsedBeforePause + (running ? Date.now()-startTimestamp : 0);
      pendingSeconds = Math.round(elapsedMs/1000);
    } else {
      if(pendingSeconds===0){
        elapsedMs = elapsedBeforePause + (running ? Date.now()-startTimestamp : 0);
        pendingSeconds = Math.round(elapsedMs/1000);
      }
    }
    running = false;
    if(pendingSeconds > 0){
      elapsedBeforePause = pendingSeconds * 1000;
      saveSession();
      logEntry.classList.add('show');
      taskInput.value = '';
      taskInput.focus();
    } else {
      hardReset();
    }
  });

  function hardReset(){
    running = false;
    clearInterval(interval);
    elapsedBeforePause = 0;
    pendingSeconds = 0;
    countdownTotalMs = 0;
    startBtn.disabled = false;
    startBtn.textContent = 'Start';
    pauseBtn.disabled = true;
    stopBtn.disabled = true;
    stopBtn.textContent = 'Stop & Log';
    modeStopwatch.disabled = false;
    modeCountdown.disabled = false;
    setH.disabled = setM.disabled = setS.disabled = false;
    logEntry.classList.remove('show');
    resetDisplay();
    clearSession();
  }

  // --- Session persistence: survives closing the browser / tab ---
  async function saveSession(){
    try{
      await window.storage.set('worklog:session', JSON.stringify({
        mode, running, startTimestamp, elapsedBeforePause, countdownTotalMs
      }));
    }catch(e){}
  }
  async function clearSession(){
    try{ await window.storage.delete('worklog:session'); }catch(e){}
  }
  async function restoreSession(){
    let saved;
    try{
      const res = await window.storage.get('worklog:session');
      saved = res && res.value ? JSON.parse(res.value) : null;
    }catch(e){ saved = null; }
    if(!saved) return;

    mode = saved.mode;
    setMode(mode); // safe since running is currently false
    countdownTotalMs = saved.countdownTotalMs || 0;
    elapsedBeforePause = saved.elapsedBeforePause || 0;
    startTimestamp = saved.startTimestamp;

    if(saved.running){
      // Recompute how much time actually passed while the page was closed
      running = true;
      interval = setInterval(tick, 1000);
      tick();
      digits.classList.add('running');
      displayWrap.dataset.status = 'Running';
      startBtn.disabled = true;
      pauseBtn.disabled = false;
      stopBtn.disabled = false;
      modeStopwatch.disabled = true;
      modeCountdown.disabled = true;
      setH.disabled = setM.disabled = setS.disabled = true;
    } else if(elapsedBeforePause > 0){
      // was paused
      running = false;
      const elapsed = elapsedBeforePause;
      digits.textContent = mode==='stopwatch' ? fmt(elapsed) : fmt(Math.max(0, countdownTotalMs - elapsed));
      displayWrap.dataset.status = 'Paused';
      startBtn.textContent = 'Resume';
      pauseBtn.disabled = true;
      stopBtn.disabled = false;
      modeStopwatch.disabled = true;
      modeCountdown.disabled = true;
      setH.disabled = setM.disabled = setS.disabled = true;
    }
  }

  // If the tab was backgrounded/locked, recompute instantly when it becomes visible again
  document.addEventListener('visibilitychange', ()=>{
    if(document.visibilityState === 'visible' && running){
      tick();
    }
  });

  discardBtn.addEventListener('click', hardReset);

  saveBtn.addEventListener('click', async ()=>{
    const task = taskInput.value.trim() || 'Untitled session';
    const entry = {
      id: 'e' + Date.now(),
      task,
      seconds: pendingSeconds,
      mode,
      timestamp: Date.now()
    };
    entries.unshift(entry);
    await persist();
    renderLog();
    renderStats();
    hardReset();
  });

  taskInput.addEventListener('keydown', (e)=>{
    if(e.key === 'Enter') saveBtn.click();
  });

  async function persist(){
    try{
      await window.storage.set('worklog:entries', JSON.stringify(entries));
    }catch(e){ console.error('save failed', e); }
  }

  async function loadEntries(){
    try{
      const res = await window.storage.get('worklog:entries');
      if(res && res.value){
        entries = JSON.parse(res.value);
      }
    }catch(e){
      entries = [];
    }
    renderLog();
  }

  function isToday(ts){
    const d = new Date(ts), now = new Date();
    return d.toDateString() === now.toDateString();
  }

  function renderStats(){
    const now = Date.now();
    const weekMs = 7*24*3600*1000;
    const cutoff = now - weekMs;
    const recent = entries.filter(e => e.timestamp >= cutoff);
    const weekTotalSec = recent.reduce((a,e)=>a+e.seconds,0);
    const dailyAvgSec = Math.round(weekTotalSec / 7);
    const activeDays = new Set(recent.map(e => new Date(e.timestamp).toDateString())).size;

    document.getElementById('statWeekTotal').textContent = fmtHuman(weekTotalSec);
    document.getElementById('statDailyAvg').textContent = fmtHuman(dailyAvgSec);
    document.getElementById('statActiveDays').textContent = `${activeDays} / 7`;

    renderDayBrowse();
  }

  // --- Swipeable day browser: offset 0 = today, 1 = yesterday, 2 = two days ago, etc. ---
  let dayOffset = 1; // default view: yesterday
  const dayBrowseDate = document.getElementById('dayBrowseDate');
  const dayBrowseTotal = document.getElementById('dayBrowseTotal');
  const dayBrowseList = document.getElementById('dayBrowseList');
  const dayPrevBtn = document.getElementById('dayPrev');
  const dayNextBtn = document.getElementById('dayNext');
  const dayBrowseEl = document.getElementById('dayBrowse');

  function dayLabel(offset, dateObj){
    if(offset === 0) return 'Today';
    if(offset === 1) return 'Yesterday';
    return dateObj.toLocaleDateString(undefined, {weekday:'short', month:'short', day:'numeric'});
  }

  function renderDayBrowse(){
    const target = new Date();
    target.setDate(target.getDate() - dayOffset);
    const targetStr = target.toDateString();

    dayBrowseDate.textContent = dayLabel(dayOffset, target);
    dayNextBtn.disabled = (dayOffset <= 0);

    const dayEntries = entries.filter(e => new Date(e.timestamp).toDateString() === targetStr)
      .sort((a,b)=>a.timestamp - b.timestamp);
    const totalSec = dayEntries.reduce((a,e)=>a+e.seconds,0);
    dayBrowseTotal.textContent = fmtHuman(totalSec);

    dayBrowseList.innerHTML = '';
    if(dayEntries.length === 0){
      dayBrowseList.innerHTML = '<div class="empty">Nothing logged this day.</div>';
    } else {
      dayEntries.forEach(e=>{
        const row = document.createElement('div');
        row.className = 'entry';
        const time = new Date(e.timestamp).toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});
        row.innerHTML = `
          <div class="left">
            <div class="task">${escapeHtml(e.task)}</div>
            <div class="meta">${time} · ${e.mode==='countdown'?'countdown':(e.mode==='manual'?'added manually':'stopwatch')}</div>
          </div>
          <div class="dur">${fmtHuman(e.seconds)}</div>
        `;
        dayBrowseList.appendChild(row);
      });
    }
  }

  dayPrevBtn.addEventListener('click', ()=>{
    dayOffset += 1;
    renderDayBrowse();
  });
  dayNextBtn.addEventListener('click', ()=>{
    if(dayOffset > 0){
      dayOffset -= 1;
      renderDayBrowse();
    }
  });

  // Swipe support
  let touchStartX = null;
  dayBrowseEl.addEventListener('touchstart', (e)=>{
    touchStartX = e.changedTouches[0].clientX;
  }, {passive:true});
  dayBrowseEl.addEventListener('touchend', (e)=>{
    if(touchStartX === null) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const threshold = 40;
    if(dx > threshold){
      dayPrevBtn.click(); // swipe right → go back a day
    } else if(dx < -threshold){
      dayNextBtn.click(); // swipe left → go forward a day
    }
    touchStartX = null;
  }, {passive:true});

  function renderLog(){
    logList.innerHTML = '';
    const todays = entries.filter(e => isToday(e.timestamp));
    if(todays.length===0){
      logList.innerHTML = '<div class="empty">No entries yet — start a timer above.</div>';
    } else {
      todays.forEach(e=>{
        const row = document.createElement('div');
        row.className = 'entry';
        const time = new Date(e.timestamp).toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});
        row.innerHTML = `
          <div class="left">
            <div class="task">${escapeHtml(e.task)}</div>
            <div class="meta">${time} · ${e.mode==='countdown'?'countdown':(e.mode==='manual'?'added manually':'stopwatch')}</div>
          </div>
          <div class="dur">${fmtHuman(e.seconds)}</div>
          <button class="del" data-id="${e.id}" title="Delete">✕</button>
        `;
        logList.appendChild(row);
      });
    }
    const totalSec = todays.reduce((a,e)=>a+e.seconds,0);
    dayTotal.textContent = fmtHuman(totalSec);
    renderStats();

    document.querySelectorAll('.del').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        entries = entries.filter(e=>e.id !== btn.dataset.id);
        await persist();
        renderLog();
      });
    });
  }

  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  // --- Export / Import ---
  const exportBtn = document.getElementById('exportBtn');
  const importBtn = document.getElementById('importBtn');
  const importFile = document.getElementById('importFile');

  exportBtn.addEventListener('click', ()=>{
    const payload = {
      exportedAt: new Date().toISOString(),
      entries: entries
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const stamp = new Date().toISOString().slice(0,10);
    a.href = url;
    a.download = `worklog-${stamp}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  });

  importBtn.addEventListener('click', ()=> importFile.click());

  importFile.addEventListener('change', (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = async (evt)=>{
      try{
        const data = JSON.parse(evt.target.result);
        const incoming = Array.isArray(data) ? data : (data.entries || []);
        if(!Array.isArray(incoming)) throw new Error('bad format');

        // Merge: keep existing, add incoming ones not already present (by id, fallback to task+timestamp match)
        const existingIds = new Set(entries.map(e=>e.id));
        let added = 0;
        incoming.forEach(inc=>{
          if(!inc || typeof inc.seconds !== 'number' || !inc.timestamp) return;
          const id = inc.id || ('imp' + inc.timestamp + Math.random().toString(36).slice(2,7));
          if(existingIds.has(id)) return;
          entries.push({
            id,
            task: inc.task || 'Untitled session',
            seconds: inc.seconds,
            mode: inc.mode || 'stopwatch',
            timestamp: inc.timestamp
          });
          existingIds.add(id);
          added++;
        });
        entries.sort((a,b)=>b.timestamp - a.timestamp);
        await persist();
        renderLog();
        alert(added > 0 ? `Imported ${added} new entr${added===1?'y':'ies'}.` : 'No new entries found (already up to date).');
      }catch(err){
        alert('Could not read that file — make sure it\'s a log exported from this app.');
      }
      importFile.value = '';
    };
    reader.readAsText(file);
  });

  // --- Manual "add a past entry" ---
  const addManualBtn = document.getElementById('addManualBtn');
  const manualEntry = document.getElementById('manualEntry');
  const manualTask = document.getElementById('manualTask');
  const manualDate = document.getElementById('manualDate');
  const manualTime = document.getElementById('manualTime');
  const manualH = document.getElementById('manualH');
  const manualM = document.getElementById('manualM');
  const manualCancelBtn = document.getElementById('manualCancelBtn');
  const manualSaveBtn = document.getElementById('manualSaveBtn');

  function fmtDateInput(d){
    return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
  }
  function fmtTimeInput(d){
    return pad(d.getHours()) + ':' + pad(d.getMinutes());
  }

  addManualBtn.addEventListener('click', ()=>{
    const now = new Date();
    manualTask.value = '';
    manualDate.value = fmtDateInput(now);
    manualTime.value = fmtTimeInput(now);
    manualH.value = 0;
    manualM.value = 30;
    manualEntry.classList.add('show');
    manualTask.focus();
  });

  manualCancelBtn.addEventListener('click', ()=>{
    manualEntry.classList.remove('show');
  });

  manualSaveBtn.addEventListener('click', async ()=>{
    const task = manualTask.value.trim() || 'Untitled session';
    const hrs = parseInt(manualH.value) || 0;
    const mins = parseInt(manualM.value) || 0;
    const seconds = hrs*3600 + mins*60;
    if(seconds <= 0){ alert('Enter a duration greater than 0.'); return; }
    if(!manualDate.value || !manualTime.value){ alert('Pick a date and time.'); return; }

    const timestamp = new Date(`${manualDate.value}T${manualTime.value}`).getTime();
    if(isNaN(timestamp)){ alert('That date/time looks invalid.'); return; }

    entries.push({
      id: 'm' + Date.now() + Math.random().toString(36).slice(2,6),
      task,
      seconds,
      mode: 'manual',
      timestamp
    });
    entries.sort((a,b)=>b.timestamp - a.timestamp);
    await persist();
    renderLog();
    manualEntry.classList.remove('show');
  });

  resetDisplay();
  loadEntries();
  restoreSession();
})();
</script>
</body>
</html>
