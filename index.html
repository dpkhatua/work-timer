<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ledger — Work Timer</title>
<style>
  @font-face {
    font-family: 'DigitFace';
    src: local('Courier New');
  }

  :root{
    --ink: #eae6dc;
    --ink-dim: #9a9488;
    --paper: #14130f;
    --paper-raised: #1c1a15;
    --line: #322f27;
    --brass: #c7a252;
    --brass-dim: #7a6634;
    --red: #b5533c;
    --green: #6f8f5a;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  body{
    background: var(--paper);
    background-image:
      radial-gradient(circle at 20% 10%, rgba(199,162,82,0.05), transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(199,162,82,0.04), transparent 40%);
    color: var(--ink);
    font-family: 'Courier New', Courier, monospace;
    min-height: 100vh;
    display:flex;
    justify-content:center;
    padding: 28px 16px 60px;
    -webkit-font-smoothing: antialiased;
  }

  .sheet{
    width:100%;
    max-width: 560px;
  }

  header{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    border-bottom: 1px solid var(--line);
    padding-bottom: 14px;
    margin-bottom: 22px;
  }

  header .mark{
    font-size: 13px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--brass);
  }
  header .date{
    font-size: 11px;
    color: var(--ink-dim);
    letter-spacing: 0.05em;
  }

  /* Mode toggle */
  .modes{
    display:flex;
    gap: 0;
    margin-bottom: 22px;
    border: 1px solid var(--line);
  }
  .modes button{
    flex:1;
    background: transparent;
    border:none;
    color: var(--ink-dim);
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 11px 0;
    cursor:pointer;
    transition: background .15s, color .15s;
  }
  .modes button + button{ border-left: 1px solid var(--line); }
  .modes button.active{
    background: var(--brass);
    color: #14130f;
    font-weight: bold;
  }

  /* Timer display */
  .display-wrap{
    background: var(--paper-raised);
    border: 1px solid var(--line);
    padding: 40px 20px 32px;
    text-align:center;
    margin-bottom: 18px;
    position: relative;
  }
  .display-wrap::before{
    content: attr(data-status);
    position:absolute;
    top: 12px; left: 14px;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--ink-dim);
    text-transform: uppercase;
  }

  .digits{
    font-size: 58px;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
    line-height:1;
    color: var(--ink);
  }
  .digits.running{ color: var(--brass); }
  .digits.overdue{ color: var(--red); }

  .countdown-set{
    display:flex;
    justify-content:center;
    gap: 10px;
    margin-top: 18px;
  }
  .countdown-set input{
    width: 64px;
    background: var(--paper);
    border: 1px solid var(--line);
    color: var(--ink);
    font-family: inherit;
    font-size: 16px;
    text-align:center;
    padding: 8px 4px;
  }
  .countdown-set input:focus{ outline: 1px solid var(--brass); }
  .countdown-set label{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap: 4px;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--ink-dim);
    text-transform: uppercase;
  }

  .controls{
    display:flex;
    gap: 10px;
    margin-bottom: 30px;
  }
  .controls button{
    flex:1;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 14px 0;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--ink);
    cursor:pointer;
    transition: border-color .15s, color .15s;
  }
  .controls button:hover{ border-color: var(--brass); color: var(--brass); }
  .controls button.primary{
    background: var(--brass);
    border-color: var(--brass);
    color: #14130f;
    font-weight:bold;
  }
  .controls button.primary:hover{ color:#14130f; }
  .controls button.stop{ border-color: var(--red); color: var(--red); }
  .controls button:disabled{ opacity: 0.35; cursor:not-allowed; }

  /* Log entry field, appears when stopping with time > 0 */
  .log-entry{
    display:none;
    background: var(--paper-raised);
    border: 1px solid var(--brass-dim);
    padding: 16px;
    margin-bottom: 22px;
  }
  .log-entry.show{ display:block; }
  .log-entry .label{
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--brass);
    margin-bottom: 8px;
  }
  .log-entry input[type=text]{
    width:100%;
    background: var(--paper);
    border: 1px solid var(--line);
    color: var(--ink);
    font-family: inherit;
    font-size: 14px;
    padding: 10px;
    margin-bottom: 10px;
  }
  .log-entry input[type=text]:focus{ outline:1px solid var(--brass); }
  .log-entry .row{ display:flex; gap:10px; }
  .log-entry .row button{
    flex:1;
    font-family:inherit;
    font-size: 11px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    padding: 10px 0;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--ink);
    cursor:pointer;
  }
  .log-entry .row button.save{
    background: var(--green);
    border-color: var(--green);
    color: #0f130e;
    font-weight:bold;
  }

  /* Ledger / log list */
  .ledger-head{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    border-bottom: 1px solid var(--line);
    padding-bottom: 8px;
    margin-bottom: 12px;
  }
  .ledger-head h2{
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-dim);
    font-weight:normal;
  }
  .ledger-head .total{
    font-size: 12px;
    color: var(--brass);
  }

  .entry{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding: 12px 2px;
    border-bottom: 1px dashed var(--line);
    gap: 10px;
  }
  .entry .left{ min-width:0; }
  .entry .task{
    font-size: 14px;
    color: var(--ink);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .entry .meta{
    font-size: 10px;
    color: var(--ink-dim);
    margin-top: 3px;
    letter-spacing: 0.05em;
  }
  .entry .dur{
    font-size: 15px;
    color: var(--brass);
    font-variant-numeric: tabular-nums;
    white-space:nowrap;
  }
  .entry .del{
    background:none;
    border:none;
    color: var(--ink-dim);
    font-size: 16px;
    cursor:pointer;
    padding: 0 0 0 6px;
    line-height:1;
  }
  .entry .del:hover{ color: var(--red); }

  .empty{
    color: var(--ink-dim);
    font-size: 12px;
    text-align:center;
    padding: 30px 0;
    letter-spacing: 0.05em;
  }

  .io-row{
    display:flex;
    gap: 10px;
    margin-top: 20px;
  }
  .io-row button{
    flex:1;
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 11px 0;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--ink-dim);
    cursor:pointer;
    transition: border-color .15s, color .15s;
  }
  .io-row button:hover{ border-color: var(--brass); color: var(--brass); }

  footer{
    margin-top: 22px;
    text-align:center;
    font-size: 10px;
    color: var(--line);
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>
<div class="sheet">

  <header>
    <div class="mark">Ledger</div>
    <div class="date" id="today"></div>
  </header>

  <div class="modes">
    <button id="modeStopwatch" class="active">Stopwatch</button>
    <button id="modeCountdown">Countdown</button>
  </div>

  <div class="display-wrap" id="displayWrap" data-status="Ready">
    <div class="digits" id="digits">00:00:00</div>
    <div class="countdown-set" id="countdownSet" style="display:none;">
      <label>Hrs <input type="number" id="setH" min="0" max="23" value="0"></label>
      <label>Min <input type="number" id="setM" min="0" max="59" value="25"></label>
      <label>Sec <input type="number" id="setS" min="0" max="59" value="0"></label>
    </div>
  </div>

  <div class="controls">
    <button id="startBtn" class="primary">Start</button>
    <button id="pauseBtn" disabled>Pause</button>
    <button id="stopBtn" class="stop" disabled>Stop &amp; Log</button>
  </div>

  <div class="log-entry" id="logEntry">
    <div class="label">What did you work on?</div>
    <input type="text" id="taskInput" placeholder="e.g. Drafted client proposal" maxlength="120">
    <div class="row">
      <button id="discardBtn">Discard</button>
      <button id="saveBtn" class="save">Save entry</button>
    </div>
  </div>

  <div class="ledger-head">
    <h2>Today's Log</h2>
    <div class="total" id="dayTotal">0h 00m</div>
  </div>

  <div id="logList"></div>

  <div class="io-row">
    <button id="exportBtn">Export log (.json)</button>
    <button id="importBtn">Import log (.json)</button>
    <input type="file" id="importFile" accept="application/json" style="display:none;">
  </div>

  <footer>ENTRIES ARE SAVED PRIVATELY IN THIS BROWSER ON THIS DEVICE — USE EXPORT TO BACK UP OR MOVE THEM</footer>
</div>

<script>
(function(){
  const digits = document.getElementById('digits');
  const displayWrap = document.getElementById('displayWrap');
  const startBtn = document.getElementById('startBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const stopBtn = document.getElementById('stopBtn');
  const modeStopwatch = document.getElementById('modeStopwatch');
  const modeCountdown = document.getElementById('modeCountdown');
  const countdownSet = document.getElementById('countdownSet');
  const setH = document.getElementById('setH');
  const setM = document.getElementById('setM');
  const setS = document.getElementById('setS');
  const logEntry = document.getElementById('logEntry');
  const taskInput = document.getElementById('taskInput');
  const saveBtn = document.getElementById('saveBtn');
  const discardBtn = document.getElementById('discardBtn');
  const logList = document.getElementById('logList');
  const dayTotal = document.getElementById('dayTotal');
  const todayEl = document.getElementById('today');

  let mode = 'stopwatch'; // or 'countdown'
  let running = false;
  let startTimestamp = 0;
  let elapsedBeforePause = 0; // ms, for stopwatch
  let countdownTotalMs = 0;
  let interval = null;
  let pendingSeconds = 0; // seconds to log when stopped
  let entries = [];

  const pad = n => String(n).padStart(2,'0');

  function fmt(ms){
    let totalSec = Math.max(0, Math.round(ms/1000));
    const h = Math.floor(totalSec/3600);
    const m = Math.floor((totalSec%3600)/60);
    const s = totalSec%60;
    return `${pad(h)}:${pad(m)}:${pad(s)}`;
  }

  function fmtHuman(sec){
    const h = Math.floor(sec/3600);
    const m = Math.floor((sec%3600)/60);
    if(h>0) return `${h}h ${pad(m)}m`;
    return `${m}m ${pad(sec%60)}s`;
  }

  todayEl.textContent = new Date().toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'});

  function setMode(m){
    if(running) return; // don't allow switching mid-run
    mode = m;
    modeStopwatch.classList.toggle('active', m==='stopwatch');
    modeCountdown.classList.toggle('active', m==='countdown');
    countdownSet.style.display = m==='countdown' ? 'flex' : 'none';
    resetDisplay();
  }
  modeStopwatch.addEventListener('click', ()=>setMode('stopwatch'));
  modeCountdown.addEventListener('click', ()=>setMode('countdown'));

  function resetDisplay(){
    if(mode==='stopwatch'){
      digits.textContent = '00:00:00';
    } else {
      const total = (parseInt(setH.value)||0)*3600 + (parseInt(setM.value)||0)*60 + (parseInt(setS.value)||0);
      digits.textContent = fmt(total*1000);
    }
    digits.classList.remove('running','overdue');
    displayWrap.dataset.status = 'Ready';
  }
  [setH,setM,setS].forEach(el=>el.addEventListener('input', resetDisplay));

  function tick(){
    const now = Date.now();
    if(mode==='stopwatch'){
      const elapsed = elapsedBeforePause + (now - startTimestamp);
      digits.textContent = fmt(elapsed);
    } else {
      const elapsed = elapsedBeforePause + (now - startTimestamp);
      const remaining = countdownTotalMs - elapsed;
      if(remaining <= 0){
        digits.textContent = '00:00:00';
        digits.classList.add('overdue');
        digits.classList.remove('running');
        displayWrap.dataset.status = 'Time\'s up';
        clearInterval(interval);
        running = false;
        pendingSeconds = Math.round(countdownTotalMs/1000);
        startBtn.disabled = true;
        pauseBtn.disabled = true;
        stopBtn.disabled = false;
        stopBtn.textContent = 'Log this session';
        // gentle alert
        try{ navigator.vibrate && navigator.vibrate([200,100,200]); }catch(e){}
      } else {
        digits.textContent = fmt(remaining);
      }
    }
  }

  startBtn.addEventListener('click', ()=>{
    if(mode==='countdown' && elapsedBeforePause===0){
      const total = (parseInt(setH.value)||0)*3600 + (parseInt(setM.value)||0)*60 + (parseInt(setS.value)||0);
      if(total<=0){ alert('Set a countdown time first.'); return; }
      countdownTotalMs = total*1000;
    }
    running = true;
    startTimestamp = Date.now();
    interval = setInterval(tick, 250);
    digits.classList.add('running');
    digits.classList.remove('overdue');
    displayWrap.dataset.status = 'Running';
    startBtn.disabled = true;
    pauseBtn.disabled = false;
    stopBtn.disabled = false;
    modeStopwatch.disabled = true;
    modeCountdown.disabled = true;
    setH.disabled = setM.disabled = setS.disabled = true;
  });

  pauseBtn.addEventListener('click', ()=>{
    running = false;
    clearInterval(interval);
    elapsedBeforePause += Date.now() - startTimestamp;
    digits.classList.remove('running');
    displayWrap.dataset.status = 'Paused';
    startBtn.disabled = false;
    startBtn.textContent = 'Resume';
    pauseBtn.disabled = true;
  });

  stopBtn.addEventListener('click', ()=>{
    clearInterval(interval);
    let elapsedMs;
    if(mode==='stopwatch'){
      elapsedMs = elapsedBeforePause + (running ? Date.now()-startTimestamp : 0);
      pendingSeconds = Math.round(elapsedMs/1000);
    } else {
      if(pendingSeconds===0){
        elapsedMs = elapsedBeforePause + (running ? Date.now()-startTimestamp : 0);
        pendingSeconds = Math.round(elapsedMs/1000);
      }
    }
    running = false;
    if(pendingSeconds > 0){
      logEntry.classList.add('show');
      taskInput.value = '';
      taskInput.focus();
    } else {
      hardReset();
    }
  });

  function hardReset(){
    running = false;
    clearInterval(interval);
    elapsedBeforePause = 0;
    pendingSeconds = 0;
    countdownTotalMs = 0;
    startBtn.disabled = false;
    startBtn.textContent = 'Start';
    pauseBtn.disabled = true;
    stopBtn.disabled = true;
    stopBtn.textContent = 'Stop & Log';
    modeStopwatch.disabled = false;
    modeCountdown.disabled = false;
    setH.disabled = setM.disabled = setS.disabled = false;
    logEntry.classList.remove('show');
    resetDisplay();
  }

  discardBtn.addEventListener('click', hardReset);

  saveBtn.addEventListener('click', async ()=>{
    const task = taskInput.value.trim() || 'Untitled session';
    const entry = {
      id: 'e' + Date.now(),
      task,
      seconds: pendingSeconds,
      mode,
      timestamp: Date.now()
    };
    entries.unshift(entry);
    await persist();
    renderLog();
    hardReset();
  });

  taskInput.addEventListener('keydown', (e)=>{
    if(e.key === 'Enter') saveBtn.click();
  });

  async function persist(){
    try{
      localStorage.setItem('worklog:entries', JSON.stringify(entries));
    }catch(e){ console.error('save failed', e); }
  }

  async function loadEntries(){
    try{
      const raw = localStorage.getItem('worklog:entries');
      if(raw){
        entries = JSON.parse(raw);
      }
    }catch(e){
      entries = [];
    }
    renderLog();
  }

  function isToday(ts){
    const d = new Date(ts), now = new Date();
    return d.toDateString() === now.toDateString();
  }

  function renderLog(){
    logList.innerHTML = '';
    const todays = entries.filter(e => isToday(e.timestamp));
    if(todays.length===0){
      logList.innerHTML = '<div class="empty">No entries yet — start a timer above.</div>';
    } else {
      todays.forEach(e=>{
        const row = document.createElement('div');
        row.className = 'entry';
        const time = new Date(e.timestamp).toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});
        row.innerHTML = `
          <div class="left">
            <div class="task">${escapeHtml(e.task)}</div>
            <div class="meta">${time} · ${e.mode==='countdown'?'countdown':'stopwatch'}</div>
          </div>
          <div class="dur">${fmtHuman(e.seconds)}</div>
          <button class="del" data-id="${e.id}" title="Delete">✕</button>
        `;
        logList.appendChild(row);
      });
    }
    const totalSec = todays.reduce((a,e)=>a+e.seconds,0);
    dayTotal.textContent = fmtHuman(totalSec);

    document.querySelectorAll('.del').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        entries = entries.filter(e=>e.id !== btn.dataset.id);
        await persist();
        renderLog();
      });
    });
  }

  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  // --- Export / Import ---
  const exportBtn = document.getElementById('exportBtn');
  const importBtn = document.getElementById('importBtn');
  const importFile = document.getElementById('importFile');

  exportBtn.addEventListener('click', ()=>{
    const payload = {
      exportedAt: new Date().toISOString(),
      entries: entries
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const stamp = new Date().toISOString().slice(0,10);
    a.href = url;
    a.download = `worklog-${stamp}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  });

  importBtn.addEventListener('click', ()=> importFile.click());

  importFile.addEventListener('change', (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = async (evt)=>{
      try{
        const data = JSON.parse(evt.target.result);
        const incoming = Array.isArray(data) ? data : (data.entries || []);
        if(!Array.isArray(incoming)) throw new Error('bad format');

        // Merge: keep existing, add incoming ones not already present (by id, fallback to task+timestamp match)
        const existingIds = new Set(entries.map(e=>e.id));
        let added = 0;
        incoming.forEach(inc=>{
          if(!inc || typeof inc.seconds !== 'number' || !inc.timestamp) return;
          const id = inc.id || ('imp' + inc.timestamp + Math.random().toString(36).slice(2,7));
          if(existingIds.has(id)) return;
          entries.push({
            id,
            task: inc.task || 'Untitled session',
            seconds: inc.seconds,
            mode: inc.mode || 'stopwatch',
            timestamp: inc.timestamp
          });
          existingIds.add(id);
          added++;
        });
        entries.sort((a,b)=>b.timestamp - a.timestamp);
        await persist();
        renderLog();
        alert(added > 0 ? `Imported ${added} new entr${added===1?'y':'ies'}.` : 'No new entries found (already up to date).');
      }catch(err){
        alert('Could not read that file — make sure it\'s a log exported from this app.');
      }
      importFile.value = '';
    };
    reader.readAsText(file);
  });

  resetDisplay();
  loadEntries();
})();
</script>
</body>
</html>
